name: CI

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master, dev]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run lint

      # Тесты специально не получают ключи: они проверяют чистые функции
      # (rowToProject/rowToReview) и в базу не ходят. Если когда-нибудь
      # тест здесь упадёт из-за отсутствия ключей — значит он полез в сеть,
      # и это повод переписать тест, а не выдать ему секреты.
      - run: npm test

      # А вот сборке база нужна по-настоящему: страницы портфолио и отзывов
      # генерируются заранее, из данных. Без этих переменных build упадёт
      # с той же ошибкой, что и локально.
      #
      # SUPABASE_SERVICE_ROLE_KEY здесь СОЗНАТЕЛЬНО нет, хотя счётчик
      # просмотров его использует. Задача CI — проверить, что код собирается,
      # а не выпустить готовый сайт (это делает Vercel, и там ключ задан).
      # Ключ обходит RLS, и держать его копию ещё и в GitHub Actions — лишний
      # носитель секрета без выгоды. Сборка это переживает: getViewCounts
      # отдаёт пустой список, страницы собираются без чисел (см. views.ts).
      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
